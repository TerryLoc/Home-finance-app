services:
  - type: web
    name: home-finance-app
    runtime: python
    plan: free
    buildCommand: './build.sh'
    startCommand: 'gunicorn home_finance.wsgi:application'
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard (Neon PostgreSQL)
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: PYTHON_VERSION
        value: '3.13.0'
      - key: CSRF_TRUSTED_ORIGINS
        value: 'https://home-finance-app.onrender.com'
